<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vivek — about this page</title>
  <meta name="description" content="How the daily picture is made.">
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0e12;
      --ink: #f4efe7;
      --muted: #6f6a63;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(1200px 800px at 50% -10%, #16171d 0%, var(--bg) 60%) fixed,
        var(--bg);
      color: var(--ink);
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(2.5rem, 8vh, 5rem) 1.4rem clamp(3rem, 8vh, 5rem);
    }
    main {
      width: min(100%, 38rem);
    }
    h1 {
      font-weight: 600;
      font-size: clamp(1.9rem, 6vw, 2.8rem);
      letter-spacing: -0.015em;
      line-height: 1.05;
      margin-bottom: 1.6rem;
    }
    p {
      font-weight: 400;
      font-size: clamp(1.02rem, 2.4vw, 1.14rem);
      line-height: 1.7;
      color: #d8d2c8;
      margin-bottom: 1.15rem;
    }
    p.lede { color: var(--ink); font-size: clamp(1.12rem, 2.8vw, 1.28rem); }
    em { color: var(--ink); font-style: italic; }
    .small {
      margin-top: 2rem;
      font-size: .92rem;
      line-height: 1.6;
      color: var(--muted);
    }
    footer {
      margin-top: 2.6rem;
      font-size: .8rem;
      letter-spacing: .08em;
    }
    footer a { color: var(--muted); text-decoration: none; transition: color .25s ease; }
    footer a:hover { color: var(--ink); }
    footer .dot { color: var(--muted); opacity: .5; margin: 0 .5rem; }
  </style>
</head>
<body>
  <main>
    <h1>About this page</h1>

    <p class="lede">This site is one picture, new every day, painted overnight.</p>

    <p class="small">Made with an open image model on a small server.</p>

    <footer>
      <nav><a href="index.html">home</a><span class="dot">·</span><a href="archive.html">archive</a></nav>
    </footer>
  </main>
</body>
</html>
