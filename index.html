<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vivek</title>
  <meta name="description" content="Vivek — a new picture every day.">
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0e12;
      --ink: #f4efe7;
      --muted: #6f6a63;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background:
        radial-gradient(1200px 800px at 50% -10%, #16171d 0%, var(--bg) 60%) fixed,
        var(--bg);
      color: var(--ink);
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.4rem, 4vh, 3rem);
      padding: clamp(2rem, 6vh, 5rem) 1.25rem;
      overflow-x: hidden;
    }

    h1 {
      font-weight: 600;
      font-size: clamp(2.6rem, 9vw, 5.5rem);
      letter-spacing: -0.015em;
      line-height: 1;
      text-align: center;
      opacity: 0;
      animation: rise 900ms cubic-bezier(.2,.7,.2,1) 120ms forwards;
    }

    .frame {
      width: min(92vw, 760px);
      display: flex;
      justify-content: center;
    }

    #art {
      display: block;
      max-width: 100%;
      max-height: 72vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 30px 80px -30px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.05);
      background: #111;
      opacity: 0;
      transform: translateY(14px) scale(.992);
      transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.2,1);
    }
    #art.loaded { opacity: 1; transform: none; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      h1 { animation: none; opacity: 1; }
      #art { transition: opacity .3s ease; transform: none; }
    }

    footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .55rem;
      text-align: center;
    }
    .cap {
      font-size: .82rem;
      letter-spacing: .14em;
      text-transform: lowercase;
      color: var(--muted);
      min-height: 1em;
      opacity: 0;
      transition: opacity 1s ease .3s;
    }
    .cap.show { opacity: 1; }
    nav {
      font-size: .8rem;
      letter-spacing: .08em;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      transition: color .25s ease;
    }
    nav a:hover { color: var(--ink); }
    nav .dot { color: var(--muted); opacity: .5; margin: 0 .5rem; }
  </style>
</head>
<body>
  <h1>Vivek</h1>
  <div class="frame">
    <!-- One image, regenerated daily on a homelab GPU and uploaded to Cloudflare R2.
         Freshness is handled by the object's Cache-Control, so this URL stays static. -->
    <img id="art" src="https://img.vivekbansal.com/daily.jpg" alt="A picture, new every day.">
  </div>

  <footer>
    <span id="cap" class="cap"></span>
    <nav><a href="archive.html">archive</a><span class="dot">·</span><a href="about.html">about</a></nav>
  </footer>

  <!-- Image fade-in (independent of the data script below). -->
  <script>
    (function () {
      var art = document.getElementById('art');
      function show() { art.classList.add('loaded'); }
      if (art.complete && art.naturalWidth) { show(); }
      else { art.addEventListener('load', show); art.addEventListener('error', show); }
    })();
  </script>

  <!-- Today's theme/style, served from R2 as a tiny script (no CORS needed). -->
  <script src="https://img.vivekbansal.com/daily.js"></script>
  <script>
    (function () {
      var d = window.psiteDaily;            // set by daily.js above; absent if it failed to load
      if (!d || !d.theme) return;
      var cap = document.getElementById('cap');
      cap.textContent = (d.theme + ' · ' + d.style).replace(/-/g, ' ');
      cap.classList.add('show');
    })();
  </script>
</body>
</html>
