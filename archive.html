<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vivek — archive</title>
  <meta name="description" content="One picture a day, collected.">
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0e12;
      --ink: #f4efe7;
      --muted: #6f6a63;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(1200px 800px at 50% -10%, #16171d 0%, var(--bg) 60%) fixed,
        var(--bg);
      color: var(--ink);
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: clamp(2rem, 6vh, 4rem) 1.25rem clamp(3rem, 8vh, 5rem);
    }

    header {
      text-align: center;
      margin-bottom: clamp(1.6rem, 5vh, 3rem);
    }
    header a.home {
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      letter-spacing: -0.015em;
    }
    header .sub {
      margin-top: .5rem;
      font-size: .82rem;
      letter-spacing: .14em;
      text-transform: lowercase;
      color: var(--muted);
    }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: clamp(.4rem, 1.2vw, .7rem);
    }
    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 9px;
      background: #111;
      box-shadow: 0 0 0 1px rgba(255,255,255,.05);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .8s ease, transform .8s cubic-bezier(.2,.7,.2,1);
    }
    .cell.in { opacity: 1; transform: none; }
    .cell img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform .5s cubic-bezier(.2,.7,.2,1);
    }
    .cell:hover img { transform: scale(1.05); }
    .cell .meta {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: .9rem .55rem .45rem;
      font-size: .68rem;
      letter-spacing: .06em;
      text-transform: lowercase;
      color: var(--ink);
      background: linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,0));
      opacity: 0;
      transition: opacity .25s ease;
    }
    .cell:hover .meta, .cell:focus-visible .meta { opacity: 1; }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      letter-spacing: .08em;
      padding: 3rem 0;
    }

    footer {
      margin-top: clamp(2rem, 6vh, 3.5rem);
      text-align: center;
      font-size: .8rem;
      letter-spacing: .08em;
    }
    footer a { color: var(--muted); text-decoration: none; transition: color .25s ease; }
    footer a:hover { color: var(--ink); }
    footer .dot { color: var(--muted); opacity: .5; margin: 0 .5rem; }

    @media (prefers-reduced-motion: reduce) {
      .cell { transition: opacity .3s ease; transform: none; }
      .cell img { transition: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="home" href="index.html">Vivek</a>
    <div class="sub">every day, so far</div>
  </header>

  <main id="grid" class="grid" aria-live="polite"></main>

  <footer>
    <nav><a href="index.html">home</a><span class="dot">·</span><a href="about.html">about</a></nav>
  </footer>

  <!-- Manifest of recent days, served from R2 as a tiny script (no CORS needed). -->
  <script src="https://img.vivekbansal.com/archive.js"></script>
  <script>
    (function () {
      var grid = document.getElementById('grid');
      var data = window.psiteArchive;
      var days = data && data.days || [];
      var base = (data && data.base || 'https://img.vivekbansal.com').replace(/\/$/, '');

      if (!days.length) {
        grid.className = '';
        grid.innerHTML = '<p class="empty">nothing here yet.</p>';
        return;
      }

      function pretty(s) { return (s || '').replace(/-/g, ' '); }
      function shortDate(iso) {
        var d = new Date(iso + 'T00:00:00');
        return isNaN(d) ? iso : d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      }

      days.forEach(function (day, i) {
        var a = document.createElement('a');
        a.className = 'cell';
        a.href = base + '/a/' + day.date + '.jpg';
        a.target = '_blank';
        a.rel = 'noopener';
        var label = [shortDate(day.date), pretty(day.theme), pretty(day.style)].filter(Boolean).join(' · ');
        a.title = label;

        var img = document.createElement('img');
        img.loading = 'lazy';
        img.decoding = 'async';
        img.src = base + '/a/' + day.date + '.t.jpg';
        img.alt = label;

        var meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = label;

        a.appendChild(img);
        a.appendChild(meta);
        grid.appendChild(a);

        // gentle staggered fade-in
        setTimeout(function () { a.classList.add('in'); }, Math.min(i, 12) * 45);
      });
    })();
  </script>
</body>
</html>
